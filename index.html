<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam Ali Imran — Architecture Portfolio 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#c9a84c;
  --cover:#0a0a14;
  --page:#fafaf7;
  --text:#1a1a1a;
  --muted:#888;
  --border:#e0ddd6;
  --blue:#1e3a5f;
  --green:#1a3a28;
  --ocean:#0d2233;
}
body{
  background:radial-gradient(ellipse at center,#1a1a3a 0%,#080810 100%);
  font-family:Georgia,serif;
  height:100vh;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* ── UI bar ── */
#ui{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  background:rgba(5,5,15,.75);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(201,168,76,.15);
}
#ui-title{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.4);font-family:Arial,sans-serif;text-transform:uppercase}
#ui-right{display:flex;gap:10px;align-items:center}
.ui-btn{
  background:none;border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.5);padding:5px 14px;cursor:pointer;
  border-radius:2px;font-size:11px;font-family:Arial,sans-serif;
  transition:all .2s;letter-spacing:1px;
}
.ui-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,168,76,.08)}
#page-indicator{font-size:11px;color:rgba(255,255,255,.3);font-family:Arial,sans-serif;letter-spacing:1px}

/* ── TOC Overlay ── */
#toc-overlay{
  position:fixed;inset:0;background:rgba(3,3,12,.96);z-index:200;
  display:none;align-items:center;justify-content:center;
}
#toc-overlay.open{display:flex}
#toc-panel{
  background:#0e0e1c;border:1px solid rgba(201,168,76,.2);
  width:min(560px,90vw);max-height:80vh;overflow-y:auto;
  padding:48px;position:relative;
}
#toc-panel h2{
  font-size:10px;letter-spacing:5px;color:var(--accent);
  text-transform:uppercase;font-family:Arial,sans-serif;margin-bottom:36px;
}
.toc-row{
  display:flex;align-items:baseline;gap:10px;padding:13px 0;
  border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;
}
.toc-row:hover .toc-row-name{color:var(--accent)}
.toc-row-num{font-size:9px;color:var(--accent);font-family:Arial,sans-serif;min-width:22px}
.toc-row-name{font-size:12px;letter-spacing:2px;color:#d0d0d0;font-family:Arial,sans-serif;text-transform:uppercase;transition:color .2s}
.toc-row-dots{flex:1;border-bottom:1px dotted rgba(255,255,255,.08);margin-bottom:2px}
.toc-row-pg{font-size:9px;color:#555;font-family:Arial,sans-serif}
#toc-x{position:absolute;top:16px;right:20px;background:none;border:none;color:#555;font-size:22px;cursor:pointer}
#toc-x:hover{color:var(--accent)}

/* ── Book ── */
#scene{
  perspective:2400px;display:flex;align-items:center;justify-content:center;
  width:100vw;height:100vh;
}

#book{
  display:flex;position:relative;
  box-shadow:0 60px 160px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.04);
}

/* responsive book size via CSS var set by JS */
:root{--bw:400px;--bh:400px}
.book-side{width:var(--bw);height:var(--bh);overflow:hidden;position:relative}
#lp{border-right:2px solid #bbb;box-shadow:inset -8px 0 20px rgba(0,0,0,.12)}
#rp{box-shadow:inset 8px 0 20px rgba(0,0,0,.08)}

/* spine */
#book::after{
  content:'';position:absolute;left:calc(50% - 4px);top:0;bottom:0;width:8px;
  background:linear-gradient(90deg,#888,#e0e0e0,#888);
  box-shadow:0 0 12px rgba(0,0,0,.4);z-index:15;
}
/* solo page — hide empty half + spine */
#book.solo-right #lp{width:0;border:none;box-shadow:none}
#book.solo-left  #rp{width:0;box-shadow:none}
#book.solo-right::after,#book.solo-left::after{display:none}

/* ── Page flip ── */
#flipper{
  position:absolute;right:0;top:0;
  width:var(--bw);height:var(--bh);
  transform-style:preserve-3d;
  transform-origin:left center;
  z-index:20;pointer-events:none;
  transition:transform .65s cubic-bezier(.645,.045,.355,1);
}
#flipper.go{transform:rotateY(-180deg)}
.fface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
#fback{transform:rotateY(180deg)}

/* ── Corner click ── */
#corner{
  position:absolute;bottom:0;right:0;width:64px;height:64px;
  z-index:30;cursor:pointer;
}
#corner::after{
  content:'›';
  position:absolute;bottom:8px;right:10px;
  font-size:22px;color:rgba(201,168,76,.5);
  transition:color .2s,transform .2s;
  font-family:Arial,sans-serif;
}
#corner:hover::after{color:var(--accent);transform:translateX(2px)}
#corner::before{
  content:'';position:absolute;bottom:0;right:0;
  width:0;height:0;border-style:solid;
  border-width:0 0 50px 50px;
  border-color:transparent transparent rgba(201,168,76,.12) transparent;
  transition:border-width .2s,border-color .2s;
}
#corner:hover::before{border-width:0 0 64px 64px;border-color:transparent transparent rgba(201,168,76,.22) transparent}

/* prev corner */
#lcorner{
  position:absolute;bottom:0;left:0;width:64px;height:64px;
  z-index:30;cursor:pointer;
}
#lcorner::after{
  content:'‹';position:absolute;bottom:8px;left:10px;
  font-size:22px;color:rgba(201,168,76,.3);transition:color .2s;font-family:Arial,sans-serif;
}
#lcorner:hover::after{color:var(--accent)}

/* ── Progress ── */
#prog{position:fixed;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.04);z-index:100}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#e8c96a);transition:width .5s}

/* ── Page inner styles ── */
.pg{width:100%;height:100%;position:relative;overflow:hidden}

/* Cover */
.pg.cov{
  background:var(--cover);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.cov-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(201,168,76,.05) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(201,168,76,.05) 1px,transparent 1px);
  background-size:40px 40px;
}
.cov-vline{width:1px;height:70px;background:var(--accent);margin-bottom:28px;opacity:.7}
.cov-label{font-size:9px;letter-spacing:6px;color:var(--accent);font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:18px}
.cov-name{font-size:calc(var(--bw) * 0.065);color:#fff;letter-spacing:3px;text-align:center;line-height:1.3}
.cov-sub{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.3);font-family:Arial,sans-serif;text-transform:uppercase;margin-top:8px}
.cov-year{position:absolute;bottom:24px;right:28px;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:3px;font-family:Arial,sans-serif}
.cov-corner{position:absolute;top:20px;left:20px;width:30px;height:30px;border-top:1px solid rgba(201,168,76,.3);border-left:1px solid rgba(201,168,76,.3)}
.cov-corner.br{top:auto;left:auto;bottom:20px;right:20px;border-top:none;border-left:none;border-bottom:1px solid rgba(201,168,76,.3);border-right:1px solid rgba(201,168,76,.3)}

/* Back cover */
.pg.bcov{background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bcov-line{width:40px;height:1px;background:var(--accent);margin-bottom:20px;opacity:.5}
.bcov-name{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.3);font-family:Arial,sans-serif}
.bcov-tag{font-size:9px;letter-spacing:3px;color:rgba(201,168,76,.4);font-family:Arial,sans-serif;margin-top:6px}

/* Section intro */
.pg.sec{display:flex;flex-direction:column;justify-content:flex-end;padding:44px 36px}
.pg.sec.navy{background:#1e3a5f}
.pg.sec.pine{background:#1a3a28}
.pg.sec.deep{background:#0d2233}
.pg.sec.slate{background:#1e2a3f}
.pg.sec.coal{background:#1a1a24}
.sec-n{position:absolute;top:20px;right:24px;font-size:80px;color:rgba(255,255,255,.04);font-family:Arial,sans-serif;font-weight:900;line-height:1}
.sec-tag{font-size:8px;letter-spacing:4px;color:var(--accent);font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:12px}
.sec-title{font-size:calc(var(--bw)*0.07);color:#fff;line-height:1.15;margin-bottom:16px}
.sec-desc{font-size:10px;color:rgba(255,255,255,.4);line-height:1.9;font-family:Arial,sans-serif;max-width:280px}
.sec-bar{width:24px;height:2px;background:var(--accent);margin-bottom:16px}

/* Content */
.pg.cnt{background:var(--page);padding:36px}
.pg.cnt.alt{background:#f4f2ee}
.pg-label{font-size:7px;letter-spacing:3px;color:var(--accent);font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:4px}
.pg-proj{font-size:8px;letter-spacing:2px;color:#aaa;font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:22px}
.cnt-h{font-size:15px;color:var(--text);letter-spacing:1px;margin-bottom:10px}
.cnt-div{width:24px;height:1px;background:var(--accent);margin:14px 0}
.cnt-body{font-size:10px;line-height:1.9;color:#444;font-family:Arial,sans-serif}
.cnt-kv{margin-bottom:14px}
.cnt-k{font-size:7px;letter-spacing:3px;color:var(--accent);font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:3px}
.cnt-v{font-size:11px;color:#333;font-family:Arial,sans-serif;line-height:1.5}

/* Drawing placeholder */
.drw{background:#f0ede6;border:1px solid #ddd;position:relative;display:flex;align-items:center;justify-content:center}
.drw-label{font-size:8px;letter-spacing:3px;color:#bbb;font-family:Arial,sans-serif;text-transform:uppercase;z-index:1}
.drw::before{content:'';position:absolute;inset:8px;border:1px dashed rgba(0,0,0,.07)}
.drw-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.03) 1px,transparent 1px);background-size:16px 16px}

/* TOC page */
.pg.toc-pg{background:var(--page);padding:36px}
.toc-pg-h{font-size:9px;letter-spacing:4px;color:var(--accent);font-family:Arial,sans-serif;text-transform:uppercase;margin-bottom:28px}
.toc-e{display:flex;align-items:flex-end;gap:8px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer}
.toc-e:hover .toc-e-name{color:var(--accent)}
.toc-e-n{font-size:8px;color:var(--accent);font-family:Arial,sans-serif;min-width:18px}
.toc-e-name{font-size:10px;letter-spacing:1.5px;color:#333;font-family:Arial,sans-serif;text-transform:uppercase;transition:color .2s}
.toc-e-dot{flex:1;border-bottom:1px dotted #ccc;margin-bottom:2px}
.toc-e-pg{font-size:8px;color:#bbb;font-family:Arial,sans-serif}

/* Tags / lists */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag{font-size:8px;letter-spacing:1px;padding:3px 8px;border:1px solid rgba(201,168,76,.3);color:var(--accent);font-family:Arial,sans-serif;text-transform:uppercase}

/* Page number */
.pn{position:absolute;bottom:14px;font-size:8px;color:#ccc;font-family:Arial,sans-serif;letter-spacing:2px}
.pn.l{left:36px}.pn.r{right:36px}

/* Arch shape decorations */
.arch-shape{position:absolute;opacity:.06}
.circle-deco{border-radius:50%;border:1px solid currentColor}
</style>
</head>
<body>

<!-- UI Bar -->
<div id="ui">
  <span id="ui-title">Adam Ali Imran — Architecture Portfolio</span>
  <div id="ui-right">
    <span id="page-indicator">1 / 44</span>
    <button class="ui-btn" onclick="toggleToc()">Contents</button>
    <button class="ui-btn" onclick="toggleFS()">⛶ Fullscreen</button>
  </div>
</div>

<!-- TOC Overlay -->
<div id="toc-overlay">
  <div id="toc-panel">
    <button id="toc-x" onclick="toggleToc()">×</button>
    <h2>Table of Contents</h2>
    <div id="toc-entries"></div>
  </div>
</div>

<!-- Book -->
<div id="scene">
  <div id="book">
    <div class="book-side" id="lp"></div>
    <div class="book-side" id="rp">
      <!-- Corner nav -->
      <div id="corner" onclick="nextSpread()"></div>
      <div id="lcorner" onclick="prevSpread()"></div>
    </div>
    <!-- Flipper (animates over right page) -->
    <div id="flipper">
      <div class="fface" id="ffront"></div>
      <div class="fface" id="fback"></div>
    </div>
  </div>
</div>

<!-- Progress -->
<div id="prog"><div id="prog-fill"></div></div>

<script>
// ─── Image mode ───────────────────────────────────────────────────────────────
// To use real PDF page images:
//   1. Run:  pdftoppm -png -r 150 "portfolio (1).pdf" pages/page
//      This creates pages/page-01.png … pages/page-44.png
//   2. Set IMAGE_MODE = true and IMAGE_DIR = 'pages' below.
//   The TOC and all navigation remain intact.
const IMAGE_MODE = true;
const IMAGE_DIR  = 'pages';     // folder containing page-01.png … page-44.png
const TOTAL_PAGES = 44;

function makeImagePages() {
  const blank = `<div style="width:100%;height:100%;background:#0a0a14"></div>`;
  const imgs = Array.from({length: TOTAL_PAGES}, (_, i) => {
    const n = String(i + 1).padStart(2, '0');
    return `<img src="${IMAGE_DIR}/page-${n}.png" style="width:100%;height:100%;object-fit:contain;display:block;background:#fff">`;
  });
  return [blank, ...imgs, blank]; // cover alone on right, back cover alone on left
}

// ─── Page data ───────────────────────────────────────────────────────────────
const PAGES = IMAGE_MODE ? makeImagePages() : [
  // 1 - Cover
  `<div class="pg cov">
    <div class="cov-grid"></div>
    <div class="cov-corner"></div>
    <div class="cov-corner br"></div>
    <div class="cov-vline"></div>
    <div class="cov-label">Portfolio</div>
    <div class="cov-name">ADAM<br>ALI IMRAN</div>
    <div class="cov-sub">Architecture · 2026</div>
    <div class="cov-year">2026</div>
  </div>`,

  // 2 - CV About Me
  `<div class="pg cnt">
    <div class="pg-label">Curriculum Vitae</div>
    <div class="pg-proj">&nbsp;</div>
    <div class="cnt-h">About Me</div>
    <div class="cnt-div"></div>
    <div class="cnt-body">
      I am currently pursuing a Bachelor of Science in Architecture (Honours) at Universiti Putra Malaysia (UPM), driven by a deep passion for the built environment and thoughtful design. My academic journey spans conceptual architectural studios, building construction, environmental systems, and technical design, allowing me to develop a holistic understanding of architecture as both art and science.
    </div>
    <div class="cnt-div"></div>
    <div class="cnt-kv">
      <div class="cnt-k">Email</div>

    </div>
    <span class="pn r">02</span>
  </div>`,

  // 3 - Education
  `<div class="pg cnt alt">
    <div class="pg-label">Curriculum Vitae</div>
    <div class="pg-proj">&nbsp;</div>
    <div class="cnt-h">Education</div>
    <div class="cnt-div"></div>
    <div class="cnt-kv">
      <div class="cnt-k">University</div>
      <div class="cnt-v">Universiti Putra Malaysia (UPM) — Selangor, Malaysia<br><span style="font-size:9px;color:#888">Bachelor of Science in Architecture</span></div>
    </div>
    <div class="cnt-kv">
      <div class="cnt-k">Senior High School</div>
      <div class="cnt-v">SMA Sekolah Indonesia Riyadh — Riyadh, Saudi Arabia</div>
    </div>

      <div class="cnt-k">Junior High School</div>

    </div>
    <div class="cnt-kv">
      <div class="cnt-k">Elementary</div>
      <div class="cnt-v">Ideal Indian School — Doha, Qatar</div>
    </div>
    <span class="pn r">03</span>
  </div>`,

  // 4 - Table of Contents header
  `<div class="pg toc-pg">
    <div class="toc-pg-h">Table of Contents</div>
    <div class="toc-e" onclick="gotoSpread(2)"><span class="toc-e-n">01</span><span class="toc-e-name">Curriculum Vitae</span><span class="toc-e-dot"></span><span class="toc-e-pg">02</span></div>
    <div class="toc-e" onclick="gotoSpread(2)"><span class="toc-e-n">02</span><span class="toc-e-name">Education</span><span class="toc-e-dot"></span><span class="toc-e-pg">03</span></div>
    <div class="toc-e" onclick="gotoSpread(2)"><span class="toc-e-n">03</span><span class="toc-e-name">Under The Cloud — Landmark</span><span class="toc-e-dot"></span><span class="toc-e-pg">06</span></div>
    <div class="toc-e" onclick="gotoSpread(6)"><span class="toc-e-n">04</span><span class="toc-e-name">Botanical Education Centre</span><span class="toc-e-dot"></span><span class="toc-e-pg">14</span></div>
    <div class="toc-e" onclick="gotoSpread(13)"><span class="toc-e-n">05</span><span class="toc-e-name">Aquascape — Seahorse</span><span class="toc-e-dot"></span><span class="toc-e-pg">36</span></div>
    <div class="toc-e" onclick="gotoSpread(17)"><span class="toc-e-n">06</span><span class="toc-e-name">Sky Catcher</span><span class="toc-e-dot"></span><span class="toc-e-pg">40</span></div>
    <div class="toc-e" onclick="gotoSpread(13)"><span class="toc-e-n">07</span><span class="toc-e-name">Quality Education — Micro Lab</span><span class="toc-e-dot"></span><span class="toc-e-pg">28</span></div>

        <div style="font-size:14px;letter-spacing:1px;margin-top:4px">Under The Cloud <em style="font-size:11px;color:#888">"Landmark"</em></div>
      </div>
      <div style="padding:16px 0;border-bottom:1px solid #eee">
        <div style="font-size:8px;letter-spacing:3px;color:var(--accent);font-family:Arial,sans-serif">PROJECT 02</div>

      </div>
      <div style="padding:16px 0;border-bottom:1px solid #eee">
        <div style="font-size:8px;letter-spacing:3px;color:var(--accent);font-family:Arial,sans-serif">PROJECT 03</div>
        <div style="font-size:14px;letter-spacing:1px;margin-top:4px">Aquascape <em style="font-size:11px;color:#888">"Seahorse"</em></div>

      <div style="padding:16px 0;border-bottom:1px solid #eee">
        <div style="font-size:8px;letter-spacing:3px;color:var(--accent);font-family:Arial,sans-serif">PROJECT 04</div>
        <div style="font-size:14px;letter-spacing:1px;margin-top:4px">Sky Catcher</div>
      </div>
      <div style="padding:16px 0">
        <div style="font-size:8px;letter-spacing:3px;color:var(--accent);font-family:Arial,sans-serif">PROJECT 05</div>

      </div>
    </div>
    <span class="pn r">05</span>
  </div>`,

  // 6 - Under The Cloud intro
  `<div class="pg sec navy">
    <div class="sec-n">01</div>
    <div class="sec-tag">Project 01 — Landmark</div>
    <div class="sec-bar"></div>
    <div class="sec-title">Under<br>The Cloud</div>
    <div class="sec-desc">Inspired by Batik megamendung, the design translates the cloud into layered forms above human scale. Light and vertical space create a spiritual journey, making users feel small, calm, and reflective.</div>
    <span class="pn l" style="color:rgba(255,255,255,.2)">06</span>
  </div>`,

  // 7 - Religious Connection + materials
  `<div class="pg cnt">
    <div class="pg-label">Concept</div>
    <div class="pg-proj">Under The Cloud</div>
    <div class="cnt-h">Religious Connection</div>
    <div class="cnt-div"></div>
    <div class="cnt-body">
      The cloud above represents something greater (God / nature), while humans remain below. Light from above symbolizes divine presence, creating a sense of humility and spiritual awareness.
    </div>
    <div class="cnt-div"></div>
    <div class="cnt-h" style="font-size:12px">Compression → Release</div>
    <div class="cnt-body" style="margin-top:8px">
      The entrance is intentionally designed narrow to create compression — a moment of tension before the space releases upward into the cloud-like ceiling volume.
    </div>
    <div class="cnt-div"></div>
    <div class="cnt-k">Materials</div>
    <div class="tag-list">
      <span class="tag">Fabric</span>
      <span class="tag">Polystyrene</span>
      <span class="tag">Board Insulation</span>
      <span class="tag">Concrete</span>
      <span class="tag">Plaster</span>
    </div>
    <span class="pn r">07</span>
  </div>`,

  // 8 - Elevation

// TOC data: [label, spreadIndex]
const TOC = [
  ['Cover', 0],
  ['Curriculum Vitae', 1],
  ['Education', 2],
  ['Table of Contents', 2],
  ['Project 01 — Under The Cloud', 3],
  ['Elevation', 4],
  ['Section & Roof Plan', 5],
  ['Interior', 5],
  ['Exterior', 6],
  ['Physical Model', 7],
  ['Project 02 — Botanical Education Centre', 7],
  ['Site Context', 8],
  ['The Project', 9],
  ['Roof Plan', 10],
  ['Elevation & Section', 11],
  ['Physical Model', 14],
  ['Project 05 — Micro Lab', 14],
  ['Site Analysis & Concept', 15],
  ['Floor Plan', 16],
  ['Physical Model', 18],
  ['Project 03 — Aquascape', 18],
  ['Translation & Manipulation', 19],
  ['Final Model', 20],
  ['Project 04 — Sky Catcher', 20],
  ['Architectural Verbs', 21],
  ['Final Physical Model', 22],
];

// ─── State ────────────────────────────────────────────────────────────────────
let spread = 0;          // current spread index (0-based)
let animating = false;
const TOTAL_SPREADS = Math.ceil(PAGES.length / 2);   // 22

function pageLeft(s)  { return PAGES[s * 2]     || ''; }
function pageRight(s) { return PAGES[s * 2 + 1] || ''; }

const lp = document.getElementById('lp');
const rp = document.getElementById('rp');
const flipper = document.getElementById('flipper');
const ffront  = document.getElementById('ffront');
const fback   = document.getElementById('fback');

function renderSpread(s) {
  const book = document.getElementById('book');
  book.classList.remove('solo-right','solo-left');
  if (s === 0) book.classList.add('solo-right');
  else if (s === TOTAL_SPREADS - 1) book.classList.add('solo-left');
  lp.innerHTML = pageLeft(s) + '<div id="lcorner" onclick="prevSpread()"></div>';
  rp.innerHTML = pageRight(s) + '<div id="corner" onclick="nextSpread()"></div>';
  // re-bind toc clicks inside pages
  document.querySelectorAll('[onclick^="gotoSpread"]').forEach(el => {
    const m = el.getAttribute('onclick').match(/gotoSpread\((\d+)\)/);
    if (m) el.onclick = () => gotoSpread(parseInt(m[1]));
  });
  updateUI();
}

function updateUI() {
  let pgText;
  if (spread === 0) pgText = '1 / 44';
  else if (spread === TOTAL_SPREADS - 1) pgText = '44 / 44';
  else pgText = `${spread * 2}–${spread * 2 + 1} / 44`;
  document.getElementById('page-indicator').textContent = pgText;
  document.getElementById('prog-fill').style.width =
    ((spread + 1) / TOTAL_SPREADS * 100) + '%';
}

function nextSpread() {
  if (animating || spread >= TOTAL_SPREADS - 1) return;
  const next = spread + 1;
  animate(next, 'forward');
}

function prevSpread() {
  if (animating || spread <= 0) return;
  const prev = spread - 1;
  // simple instant prev (no reverse animation for brevity)
  spread = prev;
  renderSpread(spread);
}

function gotoSpread(s) {
  if (animating) return;
  s = Math.max(0, Math.min(TOTAL_SPREADS - 1, s));
  if (s === spread) { toggleToc(); return; }
  spread = s;
  renderSpread(spread);
  if (document.getElementById('toc-overlay').classList.contains('open')) toggleToc();
}

function animate(next, dir) {
  animating = true;

  // Set flipper front = current right page
  ffront.innerHTML = pageRight(spread);
  // Set flipper back = next left page (mirrored — backface so it's reflected)
  fback.innerHTML  = pageLeft(next);

  // Pre-load next right page behind left page (hidden)
  // Show flipper
  flipper.style.display = 'block';
  flipper.classList.remove('go');

  // Trigger flip
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      flipper.classList.add('go');
    });
  });

  flipper.addEventListener('transitionend', function handler() {
    flipper.removeEventListener('transitionend', handler);
    spread = next;
    renderSpread(spread);
    flipper.classList.remove('go');
    flipper.style.display = 'none';
    animating = false;
  }, { once: true });
}

// ─── TOC ─────────────────────────────────────────────────────────────────────
function buildToc() {
  const container = document.getElementById('toc-entries');
  TOC.forEach(([label, s], i) => {
    const row = document.createElement('div');
    row.className = 'toc-row';
    row.innerHTML = `
      <span class="toc-row-num">${String(i+1).padStart(2,'0')}</span>
      <span class="toc-row-name">${label}</span>
      <span class="toc-row-dots"></span>
      <span class="toc-row-pg">${s === 0 ? 1 : s * 2}</span>`;
    row.onclick = () => gotoSpread(s);
    container.appendChild(row);
  });
}

function toggleToc() {
  document.getElementById('toc-overlay').classList.toggle('open');
}

// ─── Fullscreen ───────────────────────────────────────────────────────────────
function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ─── Responsive book size ─────────────────────────────────────────────────────
function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight - 50; // account for ui bar
  // PDF pages are square (1784×1784 pt)
  let bw = Math.min(vw / 2 - 20, 800);
  let bh = bw; // 1:1
  if (bh > vh - 20) { bh = vh - 20; bw = bh; }
  document.documentElement.style.setProperty('--bw', bw + 'px');
  document.documentElement.style.setProperty('--bh', bh + 'px');
}

// ─── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown') nextSpread();
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   prevSpread();
  if (e.key === 't' || e.key === 'T') toggleToc();
  if (e.key === 'Escape') {
    const ov = document.getElementById('toc-overlay');
    if (ov.classList.contains('open')) toggleToc();
  }
  if (e.key === 'f' || e.key === 'F') toggleFS();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
buildToc();
renderSpread(0);
flipper.style.display = 'none';
</script>
